name: 自动编译 Windows 独立安装包部署总线

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows-package:
    runs-on: windows-latest

    steps:
    # 步骤一：拉取全量源码资产到虚拟机磁盘
    - name: 检出仓库源码
      uses: actions/checkout@v4

    # 步骤二：修复位置：修正为 GitHub 官方标准的 setup-python 插件路径，彻底斩断 404 崩溃
    - name: 初始化 Python 运行时环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 步骤三：静默并网安装第三方依赖依赖库
    - name: 挂载并安装环境依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 步骤四：执行 PyInstaller 二进制静态编译打包
    - name: 执行 PyInstaller 静态编译打包
      run: |
        pyinstaller --onefile --noconsole --name="农机智能化调度台" main.py

    # 步骤五：将编译产出的 .exe 上传到 Actions 的资产包缓冲区
    - name: 提权并归档部署包资产
      uses: actions/upload-artifact@v4
      with:
        name: 运行在Windows平台的调度台绿色安装包
        path: dist/农机智能化调度台.exe